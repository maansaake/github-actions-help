name: Main branch protection

run-name: "Main branch protection: ${{ format('{0} #{1}', github.ref_name, github.run_number) }}"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  go:
    name: Golang
    uses: ./.github/workflows/go.yaml

  py:
    name: Python
    uses: ./.github/workflows/py.yaml

  image:
    name: Image
    uses: ./.github/workflows/image.yaml
    with:
      push: false
