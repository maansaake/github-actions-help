name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read
  packages: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: sample-py-app/requirements.txt

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: copilot-go-mod-${{ hashFiles('sample-go-app/go.sum', 'sample-go-app/tools/go.sum') }}
      - name: Restore Go build cache
        id: go-build-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: copilot-go-build-${{ hashFiles('sample-go-app/**/*.go', 'sample-go-app/go.mod', 'sample-go-app/go.sum', 'sample-go-app/tools/go.mod', 'sample-go-app/tools/go.sum') }}
          restore-keys: |
            copilot-go-build-

      - name: Download dependencies
        run: |
          go -C sample-go-app mod download
          go -C sample-go-app mod download -modfile tools/go.mod
          pip install -r sample-py-app/requirements.txt
      - name: Save Go module cache
        if: steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.go-mod-cache.outputs.cache-primary-key }}

      - name: Install golangci-lint
        run: make install-lint

      - name: Warm up govulncheck
        run: go -C sample-go-app tool -modfile tools/go.mod govulncheck -version
      - name: Save Go build cache
        if: steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.go-build-cache.outputs.cache-primary-key }}
