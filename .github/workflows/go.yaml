name: Golang

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-go-app
    strategy:
      matrix:
        # these aliases make sure to test both latest and previous minor
        # versions. Useful for library authors to make sure their code works with the latest versions of Go.
        go-version-alias: ["stable", "oldstable"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Disable the builtin caching since it uses the hash of the go.sum file
      # to determine if the cache is valid. This is not ideal since the go.sum
      # file is updated every time a new version of a dependency is downloaded.
      # Not when your code changes.
      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Resolve Go cache paths
        id: go-cache-paths
        run: |
          gomodcache=$(go env GOMODCACHE)
          gocache=$(go env GOCACHE)
          mkdir -p "$gomodcache" "$gocache"
          echo "gomodcache=$gomodcache" >> "$GITHUB_OUTPUT"
          echo "gocache=$gocache" >> "$GITHUB_OUTPUT"

      - name: Go module cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.go-cache-paths.outputs.gomodcache }}
          key: go-mod-${{ hashFiles('sample-go-app/go.sum') }}

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.go-cache-paths.outputs.gocache }}
          key: go-build-${{ matrix.go-version-alias }}-${{ hashFiles('sample-go-app/**/*.go', 'sample-go-app/go.mod', 'sample-go-app/go.sum') }}
          restore-keys: |
            go-build-${{ matrix.go-version-alias }}-

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: sample-go-app/coverage.html

      - name: Build
        run: go build -o sample-go-app
