name: Golang

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-go-app
    strategy:
      matrix:
        # these aliases make sure to test both latest and previous minor 
        # versions. Useful for library authors to make sure their code works with the latest versions of Go.
        go-version-alias: [ "stable", "oldstable" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Disable the builtin caching since it uses the hash of the go.sum file
      # to determine if the cache is valid. This is not ideal since the go.sum
      # file is updated every time a new version of a dependency is downloaded.
      # Not when your code changes.
      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Restore Go module cache
        id: go-mod-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('sample-go-app/go.sum') }}
      - name: Restore Go build cache
        id: go-build-cache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ matrix.go-version-alias }}-${{ hashFiles('sample-go-app/**/*.go', 'sample-go-app/go.mod', 'sample-go-app/go.sum') }}
          restore-keys: |
            go-build-${{ matrix.go-version-alias }}-

      - name: Install dependencies
        run: go mod download
      - name: Save Go module cache
        if: steps.go-mod-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/go/pkg/mod
          key: ${{ steps.go-mod-cache.outputs.cache-primary-key }}

      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: sample-go-app/coverage.html

      - name: Build
        run: go build -o sample-go-app
      - name: Save Go build cache
        if: steps.go-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/go-build
          key: ${{ steps.go-build-cache.outputs.cache-primary-key }}
